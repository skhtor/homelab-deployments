---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nocodb
  namespace: agd
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - nocodb-agd.home
  rules:
    - backendRefs:
        - name: nocodb
          port: 8080
