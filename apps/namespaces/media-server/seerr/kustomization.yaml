---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: seerr-chart
    repo: oci://ghcr.io/seerr-team/seerr
    version: 3.6.0
    releaseName: &releaseName seerr
    namespace: &releaseNamespace media-server
    valuesFile: values.yaml
commonAnnotations:
  meta.helm.sh/release-name: *releaseName
  meta.helm.sh/release-namespace: *releaseNamespace
commonLabels:
  app.kubernetes.io/managed-by: Helm
