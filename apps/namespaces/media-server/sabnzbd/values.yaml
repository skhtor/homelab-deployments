---
controllers:
  main:
    strategy: RollingUpdate
    defaultContainerOptions:
      envFrom:
        - configMapRef:
            name: common-settings
    containers:
      "{{ .Release.Name }}":
        image:
          repository: lscr.io/linuxserver/sabnzbd
          tag: latest
          pullPolicy: Always

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

route:
  main:
    enabled: true
    parentRefs:
      - name: internal
        namespace: networking
        sectionName: https
    hostnames:
      - sabnzbd.home

persistence:
  sabnzbd-data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    globalMounts:
      - path: /config
  nfs-media:
    existingClaim: media-server-nfs-pvc
    globalMounts:
      - path: /media/downloads/usenet
        subPath: downloads/usenet
